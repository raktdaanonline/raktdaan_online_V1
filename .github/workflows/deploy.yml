name: Deploy to Production

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build & push Backend image
        uses: docker/build-push-action@v5
        with:
          context: ./Backend
          file: ./Backend/Dockerfile
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/raktdaan-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push Frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./Frontend
          file: ./Frontend/Dockerfile
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/raktdaan-frontend:latest
          build-args: |
            VITE_APP_API_URL=https://raktdaan.online/api
            VITE_SOCKET_URL=https://raktdaan.online
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push Admin image
        uses: docker/build-push-action@v5
        with:
          context: ./admin
          file: ./admin/Dockerfile
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/raktdaan-admin:latest
          build-args: |
            VITE_APP_API_URL=https://admin.raktdaan.online/api
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy on VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script: |
            cd /var/www/raktdaan_online_V1
            # Pull latest code
            git pull origin main
            # Pull latest images
            docker pull ${{ secrets.DOCKER_USERNAME }}/raktdaan-backend:latest
            docker pull ${{ secrets.DOCKER_USERNAME }}/raktdaan-frontend:latest
            docker pull ${{ secrets.DOCKER_USERNAME }}/raktdaan-admin:latest
            # Restart all services with fresh images
            docker compose up -d --force-recreate --no-build backend frontend admin
            # Reload gateway nginx
            docker exec master-gateway nginx -s reload
            # Remove old images
            docker image prune -f
            echo "✅ Deployment complete!"
