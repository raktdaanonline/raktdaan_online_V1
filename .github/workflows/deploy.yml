name: Deploy to Production

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build & push Backend image
        uses: docker/build-push-action@v5
        with:
          context: ./Backend
          file: ./Backend/Dockerfile
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/raktdaan-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push Frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./Frontend
          file: ./Frontend/Dockerfile
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/raktdaan-frontend:latest
          build-args: |
            VITE_APP_API_URL=https://raktdaan.online/api
            VITE_SOCKET_URL=https://raktdaan.online
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push Admin image
        uses: docker/build-push-action@v5
        with:
          context: ./admin
          file: ./admin/Dockerfile
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/raktdaan-admin:latest
          build-args: |
            VITE_APP_API_URL=https://admin.raktdaan.online/api
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy on VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script: |
            set -e

            APP_DIR="${{ secrets.VPS_APP_DIR || '/var/www/raktdaan_online_V1' }}"
            cd "$APP_DIR"

            export DOCKER_USERNAME="${{ secrets.DOCKER_USERNAME }}"

            # Pull latest code from GitHub.
            git fetch origin main
            git reset --hard origin/main

            COMPOSE="docker compose -f docker-compose.yml -f docker-compose.prod.yml"

            # Pull and run the images that were just pushed by this workflow.
            $COMPOSE pull backend frontend admin
            $COMPOSE up -d --force-recreate --no-build backend frontend admin

            # Reload gateway nginx when it exists; app deploy should not fail if it is external.
            docker exec master-gateway nginx -s reload || true

            docker image prune -f
            echo "Deployment complete!"
