version: "3.9"

# Production override - uses pre-built images from Docker Hub
# Usage: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d

services:
  backend:
    image: ${DOCKER_USERNAME}/raktdaan-backend:latest
    build: !reset null

  frontend:
    image: ${DOCKER_USERNAME}/raktdaan-frontend:latest
    build: !reset null
