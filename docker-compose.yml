version: "3.9"

services:
  backend:
    build:
      context: ./Backend
      dockerfile: Dockerfile
    container_name: raktdaan-backend
    restart: unless-stopped
    env_file:
      - ./Backend/.env
    environment:
      - NODE_ENV=production
      - PORT=5000
    volumes:
      - uploads_data:/app/uploads
    networks:
      - raktdaan-network
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5000/"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ./Frontend
      dockerfile: Dockerfile
      args:
        - VITE_APP_API_URL=https://raktdaan.online/api
        - VITE_SOCKET_URL=https://raktdaan.online
    container_name: raktdaan-frontend
    restart: unless-stopped
    networks:
      - raktdaan-network
    depends_on:
      - backend

  nginx:
    image: nginx:alpine
    container_name: raktdaan-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - certbot_www:/var/www/certbot:ro
      - certbot_certs:/etc/letsencrypt:ro
    networks:
      - raktdaan-network
    depends_on:
      - backend
      - frontend

  certbot:
    image: certbot/certbot
    container_name: raktdaan-certbot
    volumes:
      - certbot_www:/var/www/certbot
      - certbot_certs:/etc/letsencrypt
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"

volumes:
  uploads_data:
  certbot_www:
  certbot_certs:

networks:
  raktdaan-network:
    driver: bridge
